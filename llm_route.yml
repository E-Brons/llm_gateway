# LLM Gateway — default routing configuration
# Override individual fields by creating local/llm_route.yml with only the keys you want to change.
# Full reference: llm_route.yml.example

general:
  implementation: cli
  model: claude-sonnet-4-6

text_gen:
  implementation: ollama
  model: phi3
  ollama_url: http://localhost:11434
  temperature: 0.3
  max_tokens: 1024

reasoning:
  implementation: cli
  model: claude-opus-4-6

image_gen:
  implementation: ollama
  model: x/flux2-klein:4b
  ollama_url: http://localhost:11434

image_inspector:
  implementation: ollama
  model: qwen2.5vl:7b
  ollama_url: http://localhost:11434

tools:
  implementation: ollama
  model: qwen3.5:9b
  ollama_url: http://localhost:11434

ipadapter:
  implementation: diffusion_server
  model: ip-adapter_sd15_light_v11
  api_base: http://localhost:7860

ipadapter_faceid:
  implementation: diffusion_server
  model: ip-adapter-faceid-plus_sd15
  api_base: http://localhost:7860
